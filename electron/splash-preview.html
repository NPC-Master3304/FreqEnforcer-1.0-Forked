<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FreqEnforcer Splash Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0d0d1a;
      overflow: hidden;
      width: 100%; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    .splash-card {
      width: 380px; height: 480px;
      background: #1a1a2e; border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid rgba(61, 61, 92, 0.5);
    }

    .icon-container {
      position: relative; width: 200px; height: 191px; margin-bottom: 28px;
    }

    .key-slice {
      position: absolute; top: 0; left: 0;
      width: 200px; height: 191px;
      transform: translateY(45px); opacity: 0;
      animation: keyBounce 400ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: var(--bounce-delay);
    }
    .key-slice svg { display: block; width: 100%; height: 100%; }
    .key-slice.white { z-index: 1; }
    .key-slice.black { z-index: 2; }

    .clip-black-left  { clip-path: polygon(0% 0%, 12.5% 0%, 12.5% 100%, 0% 100%); }
    .clip-f           { clip-path: polygon(5.5% 0%, 50.5% 0%, 50.5% 100%, 5.5% 100%); }
    .clip-e           { clip-path: polygon(49.4% 0%, 94.4% 0%, 94.4% 100%, 49.4% 100%); }
    .clip-black-right { clip-path: polygon(87.2% 0%, 100% 0%, 100% 100%, 87.2% 100%); }

    @keyframes keyBounce {
      0%   { transform: translateY(45px); opacity: 0; }
      40%  { opacity: 1; }
      70%  { transform: translateY(-22px); }
      85%  { transform: translateY(6px); }
      100% { transform: translateY(0);     opacity: 1; }
    }

    .app-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px; font-weight: 300; color: #fff;
      letter-spacing: 2px; margin-bottom: 4px;
    }
    .app-version {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px; color: #33CED6; letter-spacing: 1px; margin-bottom: 28px;
    }
    .loading-bar {
      width: 200px; height: 2px;
      background: rgba(136,136,170,0.15); border-radius: 1px; overflow: hidden;
    }
    .loading-bar-fill {
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, #33CED6, transparent);
      border-radius: 1px; animation: loadSlide 1.8s ease-in-out infinite;
    }
    @keyframes loadSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .loading-status {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px; color: #8888aa; margin-top: 12px; letter-spacing: 0.3px;
    }
    .preview-label {
      position: fixed; bottom: 12px; right: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 10px; color: rgba(136,136,170,0.4); letter-spacing: 0.5px;
    }
  </style>

    <div class="app-name">FreqEnforcer</div>
    <div class="app-version">v2.0</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    <div class="loading-status" id="status">Starting backend...</div>
  </div>

  <div class="preview-label">PREVIEW LOOP</div>

  <script>
    const LOOP_INTERVAL = 2200;
    const statusMessages = [
      { text: 'Starting backend...',     delay: 0    },
      { text: 'Loading audio engine...', delay: 1200 },
      { text: 'Warming up...',           delay: 2000 },
      { text: 'Almost ready...',         delay: 2800 },
    ];
    const statusEl = document.getElementById('status');

    function restartAnimation() {
      statusEl.textContent = statusMessages[0].text;
      statusMessages.slice(1).forEach(({ text, delay }) => {
        setTimeout(() => { statusEl.textContent = text; }, delay);
      });
      const keys = document.querySelectorAll('.key-slice');
      keys.forEach(key => {
        key.style.animation = 'none';
        key.style.opacity = '0';
        key.style.transform = 'translateY(45px)';
      });
      void document.body.offsetWidth;
      keys.forEach(key => {
        key.style.animation = '';
        key.style.opacity = '';
        key.style.transform = '';
      });
    }
    setInterval(restartAnimation, LOOP_INTERVAL);
  </script>
